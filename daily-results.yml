name: Daily Premier League Results

on:
  schedule:
    - cron: "30 22 * * *"
  workflow_dispatch:

jobs:
  send-results:
    runs-on: ubuntu-latest

    steps:
      - name: Download repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install packages
        run: npm install

      - name: Send Discord message
        run: node send-results.js
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
