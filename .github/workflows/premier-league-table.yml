name: Premier League Table

on:
  schedule:
    - cron: "15 17 * * *"
  workflow_dispatch:

jobs:
  premier-league-table:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - run: node send-pl-table.js
        env:
          DISCORD_TABLE_WEBHOOK_URL: ${{ secrets.DISCORD_TABLE_WEBHOOK_URL }}
