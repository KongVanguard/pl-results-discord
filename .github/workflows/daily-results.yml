name: Daily Football Results

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  premier-league:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: node send-results.js
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          COMPETITION_URL: "https://native-stats.org/competition/PL/"
          COMPETITION_NAME: "Premier League"
          MANUAL_RUN: ${{ github.event_name == 'workflow_dispatch' }}

  world-cup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: node send-results.js
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          COMPETITION_URL: "https://native-stats.org/competition/WC/"
          COMPETITION_NAME: "World Cup"
          MANUAL_RUN: ${{ github.event_name == 'workflow_dispatch' }}

  champions-league:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: node send-results.js
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          COMPETITION_URL: "https://native-stats.org/competition/CL/"
          COMPETITION_NAME: "Champions League"
          MANUAL_RUN: ${{ github.event_name == 'workflow_dispatch' }}
